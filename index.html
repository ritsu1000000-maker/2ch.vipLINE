<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIP Chat App</title>
  <style>
    /* ＝＝＝ ダークモード用変数 ＝＝＝ */
    :root { --bg-color: #f0f2f5; --chat-bg: #e5ddd5; --text-color: #333; }
    .dark-mode { --bg-color: #121212; --chat-bg: #1e1e1e; --text-color: #fff; }

    body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--bg-color); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; transition: background 0.3s; }
    .app-container { width: 95%; max-width: 800px; height: 95vh; background-color: var(--chat-bg); border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); position: relative; overflow: hidden; display: flex; flex-direction: column; }
    
    /* ヘッダー・コンテンツ */
    .header { background-color: #075e54; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
    .content-area { padding: 20px; overflow-y: auto; flex: 1; color: var(--text-color); }
    
    /* 友達リスト */
    .friend-item { background: white; padding: 15px; margin-bottom: 10px; border-radius: 8px; display: flex; align-items: center; cursor: pointer; border: 1px solid #ddd; }
    .status-dot { width: 10px; height: 10px; background: #25D366; border-radius: 50%; margin-right: 10px; }

    /* チャット */
    .messages { flex: 1; padding: 20px; overflow-y: auto; background-image: url('https://www.transparenttextures.com/patterns/cubes.png'); display: flex; flex-direction: column; gap: 15px; }
    .msg-wrapper { max-width: 70%; }
    .msg-wrapper.mine { align-self: flex-end; }
    .msg { padding: 10px 15px; border-radius: 12px; background: white; }
    .my-msg { background-color: #dcf8c6; }
    
    .chat-input-area { display: flex; padding: 15px; background: #f0f0f0; }
    input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ccc; }
    button { margin-left: 10px; padding: 10px 20px; border-radius: 20px; border: none; background: #128C7E; color: white; cursor: pointer; }
  </style>
</head>
<body>

  <div class="app-container" id="appContainer">
    <div id="loginScreen" class="screen active">
      <div class="header"><span>🔑 初期設定</span><button onclick="toggleDarkMode()">🌙</button></div>
      <div class="content-area">
        <input type="text" id="myNameInput" placeholder="名前">
        <input type="text" id="myIdInput" placeholder="ID">
        <button id="loginBtn">登録してはじめる</button>
      </div>
    </div>

    <div id="homeScreen" class="screen" style="display:none;">
      <div class="header"><span>🏠 ホーム</span><button onclick="toggleDarkMode()">🌙</button></div>
      <div class="content-area">
        <h3 id="displayNameHeader"></h3>
        <div id="friendsList"></div>
        <input type="text" id="friendIdInput" placeholder="追加するID">
        <button id="addFriendBtn">追加</button>
      </div>
    </div>

    <div id="chatScreen" class="screen" style="display:none;">
      <div class="header">
        <button id="backBtn">◀ 戻る</button>
        <span id="chatTitle"></span>
        <button id="callBtn">📞</button>
      </div>
      <div class="messages" id="msgArea"></div>
      <div class="chat-input-area">
        <input type="text" id="chatTextInput">
        <button id="sendBtn">送信</button>
      </div>
    </div>
  </div>

  <script>
    // 状態管理
    let myName = localStorage.getItem('chatApp_MyName') || '';
    let currentFriendId = '';
    let friends = JSON.parse(localStorage.getItem('chatApp_Friends') || '[]');

    // ダークモード
    function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }

    // 画面切り替え
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
      document.getElementById(id).style.display = 'flex';
    }

    // チャット読み込み（履歴保持）
    function loadMessages(friendId) {
      const msgArea = document.getElementById('msgArea');
      msgArea.innerHTML = '';
      const history = JSON.parse(localStorage.getItem(`chat_history_${friendId}`) || '[]');
      history.forEach(m => addMessageToUI(m.text, m.isMine));
    }

    function saveMessage(friendId, text, isMine) {
      const history = JSON.parse(localStorage.getItem(`chat_history_${friendId}`) || '[]');
      history.push({ text, isMine });
      localStorage.setItem(`chat_history_${friendId}`, JSON.stringify(history));
    }

    function addMessageToUI(text, isMine) {
      const div = document.createElement('div');
      div.className = `msg-wrapper ${isMine ? 'mine' : ''}`;
      div.innerHTML = `<div class="msg ${isMine ? 'my-msg' : ''}">${text}</div>`;
      document.getElementById('msgArea').appendChild(div);
      document.getElementById('msgArea').scrollTop = document.getElementById('msgArea').scrollHeight;
    }

    // イベント
    document.getElementById('loginBtn').onclick = () => {
      localStorage.setItem('chatApp_MyName', document.getElementById('myNameInput').value);
      location.reload();
    };

    document.getElementById('addFriendBtn').onclick = () => {
      const id = document.getElementById('friendIdInput').value;
      if(id && !friends.includes(id)) {
        friends.push(id);
        localStorage.setItem('chatApp_Friends', JSON.stringify(friends));
        renderFriends();
      }
    };

    function renderFriends() {
      const list = document.getElementById('friendsList');
      list.innerHTML = '';
      friends.forEach(id => {
        const div = document.createElement('div');
        div.className = 'friend-item';
        div.innerHTML = `<div class="status-dot"></div><span>${id}</span>`;
        div.onclick = () => {
          currentFriendId = id;
          document.getElementById('chatTitle').textContent = id;
          loadMessages(id);
          showScreen('chatScreen');
        };
        list.appendChild(div);
      });
    }

    document.getElementById('sendBtn').onclick = () => {
      const input = document.getElementById('chatTextInput');
      if(input.value) {
        addMessageToUI(input.value, true);
        saveMessage(currentFriendId, input.value, true);
        input.value = '';
      }
    };

    document.getElementById('backBtn').onclick = () => showScreen('homeScreen');

    // 初期化
    if(myName) {
      document.getElementById('displayNameHeader').textContent = `ようこそ, ${myName}`;
      showScreen('homeScreen');
      renderFriends();
    }
  </script>
</body>
</html>
